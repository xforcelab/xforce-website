<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Archive | X Force Technologies</title>
    
    <style>
        /* --- COPY OF HOMEPAGE THEME SYSTEM --- */
        :root {
            --bg-gradient: radial-gradient(at 0% 0%, rgba(0, 113, 227, 0.08) 0px, transparent 50%),
                           radial-gradient(at 100% 0%, rgba(56, 189, 248, 0.1) 0px, transparent 50%),
                           radial-gradient(at 50% 100%, rgba(255, 255, 255, 1) 0px, transparent 50%);
            --bg-color: #F5F5F7;
            --text-main: #1D1D1F;
            --text-secondary: #6E6E73;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-bg-hover: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
            --primary-accent: #0071E3;
            --icon-container-bg: rgba(0, 0, 0, 0.03);
            --icon-color: #1D1D1F;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --bg-gradient: radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                           radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.1) 0px, transparent 50%),
                           radial-gradient(at 50% 0%, rgba(2, 4, 8, 1) 0px, transparent 100%);
            --bg-color: #020408;
            --text-main: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.65);
            --glass-bg: rgba(20, 20, 20, 0.55);
            --glass-bg-hover: rgba(30, 30, 30, 0.75);
            --glass-border: rgba(255, 255, 255, 0.12);
            --primary-accent: #38bdf8;
            --icon-container-bg: rgba(255, 255, 255, 0.06);
            --icon-color: #FFFFFF;
            --shadow: 0 20px 48px rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg-color);
            background-image: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            overflow-x: hidden;
            transition: background 0.5s ease, color 0.3s ease;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        /* --- NAVIGATION --- */
        .header {
            position: fixed; top: 20px; width: 90%; left: 5%;
            height: 64px; z-index: 1000; border-radius: 100px;
            display: flex; align-items: center;
        }
        .nav { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 0 24px; }
        .logo { font-size: 1.1rem; font-weight: 700; color: var(--text-main); text-decoration: none; }
        .logo span { color: var(--primary-accent); }
        .nav-links { display: flex; gap: 24px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--text-main); font-weight: 500; font-size: 0.9rem; opacity: 0.7; transition: 0.3s; }
        .nav-links a:hover { opacity: 1; color: var(--primary-accent); }
        .theme-toggle {
            background: var(--icon-container-bg); border: 1px solid var(--glass-border);
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; color: var(--text-main);
        }

        /* --- HERO & STATS --- */
        .hero { padding: 160px 0 60px; text-align: center; }
        h1 { font-size: clamp(2.2rem, 6vw, 3.5rem); font-weight: 800; letter-spacing: -0.04em; margin-bottom: 15px; }
        .tagline { color: var(--text-secondary); font-size: 1.2rem; margin-bottom: 40px; }

        .stats-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 20px; margin-bottom: 50px; 
        }
        .stat-card { padding: 25px; border-radius: 24px; text-align: center; }
        .stat-value { font-size: 2.2rem; font-weight: 800; color: var(--primary-accent); display: block; }
        .stat-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-secondary); }

        /* --- SEARCH SECTION --- */
        .search-container { 
            position: sticky; top: 100px; z-index: 900; 
            margin-bottom: 40px; padding: 15px; border-radius: 100px;
        }
        .search-wrapper { display: flex; align-items: center; gap: 15px; padding: 0 10px; }
        .search-input {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--text-main); font-size: 1.1rem; padding: 10px;
            font-family: inherit;
        }
        .search-input::placeholder { color: var(--text-secondary); opacity: 0.5; }
        
        .sort-select {
            background: var(--icon-container-bg); color: var(--text-main);
            border: 1px solid var(--glass-border); padding: 8px 15px;
            border-radius: 50px; font-size: 0.85rem; cursor: pointer;
            outline: none;
        }

        /* --- RESULTS GRID --- */
        .results-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 100px; }
        .game-row {
            display: grid; grid-template-columns: 80px 1fr 180px;
            align-items: center; padding: 18px 24px; border-radius: 20px;
        }
        .game-row:hover { transform: scale(1.01); background: var(--glass-bg-hover); border-color: var(--primary-accent); }
        
        .game-id { font-family: monospace; font-weight: 700; color: var(--primary-accent); font-size: 1rem; }
        .game-name { font-weight: 600; font-size: 1.05rem; }
        .game-meta { display: flex; gap: 10px; justify-content: flex-end; }
        .badge {
            font-size: 0.75rem; font-weight: 700; padding: 4px 10px;
            border-radius: 6px; background: var(--icon-container-bg);
            border: 1px solid var(--glass-border); color: var(--text-secondary);
        }
        .badge.year { color: var(--primary-accent); border-color: var(--primary-accent); }

        mark { background: var(--primary-accent); color: white; border-radius: 2px; padding: 0 2px; }

        #emptyState { text-align: center; padding: 100px 0; color: var(--text-secondary); display: none; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .stats-grid { grid-template-columns: 1fr; }
            .game-row { grid-template-columns: 60px 1fr; gap: 10px; }
            .game-meta { grid-column: 2; justify-content: flex-start; margin-top: 5px; }
            .header { top: 10px; }
            .search-container { border-radius: 30px; }
        }
    </style>
</head>

            <div class="search-container glass">
                <div class="search-wrapper">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="opacity:0.5"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
                    <input type="text" id="search" class="search-input" placeholder="Search by name or ID (e.g. V23, Forza)...">
                    <select id="sortSelect" class="sort-select">
                        <option value="default">Catalog Order</option>
                        <option value="az">A-Z</option>
                        <option value="newest">Newest First</option>

        </section>

        <div id="results" class="results-list"></div>
        
        <div id="emptyState" class="glass" style="border-radius: 30px;">
            <h3>No titles found</h3>
            <p>Try a different keyword or check the ID.</p>
        </div>
    </main>

        // --- THEME ENGINE ---
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const html = document.documentElement;
        
        const applyTheme = (theme) => {
            html.setAttribute('data-theme', theme);
            themeIcon.textContent = theme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', theme);
        };

        const savedTheme = localStorage.getItem('theme') || 'dark';
        applyTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        // --- LOGIC ---
        const searchInput = document.getElementById('search');
        const resultsBox = document.getElementById('results');
        const emptyState = document.getElementById('emptyState');
        const sortSelect = document.getElementById('sortSelect');

        // Stats Calc
        const years = GAMES.map(g => g[3]).filter(Boolean);
        document.getElementById('statTotal').textContent = GAMES.length;
        document.getElementById('statYears').textContent = years.length ? `${Math.min(...years)} - ${Math.max(...years)}` : "1990 - 2024";
        document.getElementById('statDvd').textContent = GAMES.reduce((sum, g) => sum + (typeof g[2] === 'number' ? g[2] : 0), 0);

        function highlight(text, q) {
            if(!q) return text;
            const regex = new RegExp(`(${q})`, 'gi');
            return text.replace(regex, '<mark>$1</mark>');
        }

        function render() {
            const query = searchInput.value.toLowerCase().trim();
            const sortMode = sortSelect.value;
            
            let filtered = GAMES.filter(g => 
                g[0].toLowerCase().includes(query) || 
                g[1].toLowerCase().includes(query)
            );

            if(sortMode === 'az') filtered.sort((a,b) => a[1].localeCompare(b[1]));
            if(sortMode === 'newest') filtered.sort((a,b) => (b[3] || 0) - (a[3] || 0));

            if(filtered.length === 0) {
                resultsBox.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            resultsBox.innerHTML = filtered.map(g => `
                <div class="game-row glass">
                    <span class="game-id">${g[0]}</span>
                    <span class="game-name">${highlight(g[1], query)}</span>
                    <div class="game-meta">
                        ${g[2] ? `<span class="badge">${g[2]} DISCS</span>` : ''}
                        ${g[3] ? `<span class="badge year">${g[3]}</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        searchInput.addEventListener('input', render);
        sortSelect.addEventListener('change', render);
        render();

    </script>
